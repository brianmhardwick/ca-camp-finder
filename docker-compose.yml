services:
  backend:
    image: ghcr.io/brianmhardwick/ca-camp-finder-backend:latest
    restart: unless-stopped
    volumes:
      - ./data:/data
    env_file:
      - .env
    ports:
      - "127.0.0.1:8089:8000"  # local only — Caddy proxies /api/* here directly
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: ghcr.io/brianmhardwick/ca-camp-finder-frontend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"   # local only — Caddy proxies static files here
    depends_on:
      backend:
        condition: service_healthy
