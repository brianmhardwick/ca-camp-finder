services:
  backend:
    image: ghcr.io/brianmhardwick/ca-camp-finder-backend:latest
    container_name: campfinder-backend
    restart: unless-stopped
    volumes:
      - ./data:/data
    env_file:
      - .env
    ports:
      - "8089:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: ghcr.io/brianmhardwick/ca-camp-finder-frontend:latest
    container_name: campfinder-frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      backend:
        condition: service_healthy
